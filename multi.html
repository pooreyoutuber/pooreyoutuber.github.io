<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist FPS - Survival</title>
    <style>
        :root {
            --bg-color: #c4c4c4;
            --text-color: #111;
            --enemy-color: #d32f2f;
            --grass-color: #8c9c8a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Game Container */
        #game-wrapper {
            background: linear-gradient(to bottom, #d8d8d8 0%, #b5b5b5 60%, var(--grass-color) 60%, #6e7a6c 100%);
            width: 100%;
            max-width: 900px;
            height: 600px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            overflow: hidden;
            user-select: none;
            cursor: crosshair;
        }

        /* UI Stats (Same as previous) */
        .stat-box {
            position: absolute;
            text-align: center;
            color: var(--text-color);
            z-index: 10;
        }
        .stat-label {
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 900;
        }

        #kills-box { left: 20px; top: 40px; }
        #accuracy-box { left: 20px; top: 120px; }
        #health-box { right: 20px; top: 40px; }
        
        #health-bar-container {
            width: 150px;
            height: 15px;
            background: #555;
            margin-top: 5px;
            border: 2px solid #111;
        }
        #health-bar {
            width: 100%;
            height: 100%;
            background: #4caf50;
            transition: width 0.2s, background-color 0.2s;
        }

        /* Center Frame Brackets */
        #frame {
            position: absolute;
            top: 50px; left: 180px; right: 180px; bottom: 150px;
            pointer-events: none;
        }
        .bracket {
            position: absolute;
            width: 40px; height: 40px;
            border-color: rgba(17, 17, 17, 0.3);
            border-style: solid; border-width: 0;
        }
        .top-left { top: 0; left: 0; border-top-width: 6px; border-left-width: 6px; }
        .top-right { top: 0; right: 0; border-top-width: 6px; border-right-width: 6px; }
        .bottom-left { bottom: 0; left: 0; border-bottom-width: 6px; border-left-width: 6px; }
        .bottom-right { bottom: 0; right: 0; border-bottom-width: 6px; border-right-width: 6px; }

        /* The M4 Gun */
        #gun-container {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 250px;
            pointer-events: none;
            z-index: 20;
            transition: transform 0.05s ease-out;
        }
        
        /* M4 Body Parts */
        .barrel {
            position: absolute;
            top: 0; left: 50px;
            width: 20px; height: 180px;
            background: linear-gradient(to right, #222, #444, #222);
            border-radius: 3px;
        }
        .sight {
            position: absolute;
            top: 40px; left: 45px;
            width: 30px; height: 20px;
            background: #111;
            border-radius: 2px;
        }
        .handguard {
            position: absolute;
            top: 80px; left: 40px;
            width: 40px; height: 120px;
            background: repeating-linear-gradient(0deg, #222, #222 5px, #111 5px, #111 10px);
            border-radius: 5px;
        }
        .receiver {
            position: absolute;
            top: 200px; left: 30px;
            width: 60px; height: 80px;
            background: #2a2a2a;
            border-radius: 5px 5px 0 0;
        }

        /* Muzzle Flash */
        #muzzle-flash {
            position: absolute;
            top: -30px; left: 35px;
            width: 50px; height: 50px;
            background: radial-gradient(circle, #fffbd1 0%, #ff9800 40%, transparent 70%);
            opacity: 0;
            border-radius: 50%;
            transform: scale(0.5);
        }

        /* Gun Recoil Animation */
        .recoil {
            animation: shootAnim 0.1s ease-out;
        }
        @keyframes shootAnim {
            0% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(30px); } /* Gun kicks back/down */
            100% { transform: translateX(-50%) translateY(0); }
        }
        .flash-anim {
            animation: flashAnim 0.1s ease-out;
        }
        @keyframes flashAnim {
            0% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* Enemies */
        .enemy {
            position: absolute;
            width: 50px; height: 70px;
            background: #333;
            border: 4px solid var(--enemy-color);
            border-radius: 8px 8px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(100px);
            animation: popUp 0.3s forwards ease-out;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        @keyframes popUp {
            to { transform: translateY(0); }
        }
        
        /* Enemy "Eye" / Visor */
        .enemy-visor {
            margin-top: 15px;
            width: 30px; height: 10px;
            background: #ff5252;
            box-shadow: 0 0 10px #ff5252;
        }

        /* Enemy Shooting Charge Bar */
        .charge-bar-bg {
            position: absolute;
            top: -15px;
            width: 100%; height: 6px;
            background: rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
        }
        .charge-bar {
            width: 0%; height: 100%;
            background: #ff0000;
        }

        /* Damage Overlay */
        #damage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.4);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
            transition: opacity 0.1s;
        }

        /* Menu */
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }
        .title { color: white; font-size: 40px; font-weight: bold; margin-bottom: 10px; }
        .subtitle { color: #aaa; margin-bottom: 30px; text-align: center; max-width: 400px;}
        #play-btn {
            padding: 15px 50px; font-size: 24px; font-weight: bold;
            background: #fff; color: #000; border: none; cursor: pointer;
            transition: 0.2s;
        }
        #play-btn:hover { background: #ccc; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="damage-overlay"></div>

        <div id="frame">
            <div class="bracket top-left"></div>
            <div class="bracket top-right"></div>
            <div class="bracket bottom-left"></div>
            <div class="bracket bottom-right"></div>
        </div>

        <div class="stat-box" id="kills-box">
            <div class="stat-label">KILLS</div>
            <div class="stat-value" id="kills-val">0</div>
        </div>
        <div class="stat-box" id="accuracy-box">
            <div class="stat-label">ACCURACY</div>
            <div class="stat-value" id="acc-val">100%</div>
        </div>
        <div class="stat-box" id="health-box">
            <div class="stat-label">HEALTH</div>
            <div id="health-bar-container">
                <div id="health-bar"></div>
            </div>
        </div>

        <div id="gun-container">
            <div id="muzzle-flash"></div>
            <div class="barrel"></div>
            <div class="handguard"></div>
            <div class="sight"></div>
            <div class="receiver"></div>
        </div>

        <div id="menu-overlay">
            <div class="title" id="menu-title">MINIMAL FPS</div>
            <div class="subtitle" id="menu-desc">Enemies un ghaas (grass) me chhupe hain. Unke shoot karne se pehle unhe tapkao!</div>
            <button id="play-btn">START MISSION</button>
        </div>
    </div>

    <script>
        const gameWrapper = document.getElementById('game-wrapper');
        const playBtn = document.getElementById('play-btn');
        const menuOverlay = document.getElementById('menu-overlay');
        const menuTitle = document.getElementById('menu-title');
        
        const gunContainer = document.getElementById('gun-container');
        const muzzleFlash = document.getElementById('muzzle-flash');
        const damageOverlay = document.getElementById('damage-overlay');
        
        const killsVal = document.getElementById('kills-val');
        const accVal = document.getElementById('acc-val');
        const healthBar = document.getElementById('health-bar');

        let isPlaying = false;
        let health = 100;
        let kills = 0;
        let shotsFired = 0;
        let hits = 0;
        
        let spawnInterval;
        let enemyTickInterval;
        let activeEnemies = [];
        let difficultySpeed = 2000; // Time to shoot (ms)

        // Gun follows mouse horizontally slightly for 3D feel
        gameWrapper.addEventListener('mousemove', (e) => {
            if(!isPlaying) return;
            const rect = gameWrapper.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            
            // Calculate percentage across screen
            const percentX = (mouseX / rect.width) - 0.5;
            // Tilt and move gun slightly
            gunContainer.style.left = `calc(50% + ${percentX * 100}px)`;
            gunContainer.style.transform = `translateX(-50%) rotate(${percentX * 15}deg)`;
        });

        // Shooting Mechanic
        gameWrapper.addEventListener('mousedown', (e) => {
            if(!isPlaying) return;
            
            shotsFired++;
            
            // Gun Animation
            gunContainer.classList.remove('recoil');
            muzzleFlash.classList.remove('flash-anim');
            void gunContainer.offsetWidth; // trigger reflow
            gunContainer.classList.add('recoil');
            muzzleFlash.classList.add('flash-anim');

            // Play gunshot sound (synthetic beep using Web Audio API for a raw feel)
            playShootSound();

            updateStats();
        });

        function startGame() {
            menuOverlay.style.display = 'none';
            health = 100;
            kills = 0;
            shotsFired = 0;
            hits = 0;
            difficultySpeed = 2000;
            activeEnemies.forEach(e => e.el.remove());
            activeEnemies = [];
            updateStats();
            healthBar.style.width = '100%';
            healthBar.style.backgroundColor = '#4caf50';
            
            isPlaying = true;

            // Start Spawning
            spawnInterval = setInterval(spawnEnemy, 1000);
            
            // Game logic tick for enemy charging
            enemyTickInterval = setInterval(updateEnemies, 50);
        }

        function spawnEnemy() {
            if(activeEnemies.length >= 5) return; // Max 5 enemies at once

            const enemyEl = document.createElement('div');
            enemyEl.classList.add('enemy');
            
            // Random position in the "grass" area (bottom 40%)
            const minX = 100;
            const maxX = gameWrapper.clientWidth - 150;
            const minY = gameWrapper.clientHeight * 0.5; // Starts at horizon
            const maxY = gameWrapper.clientHeight - 150; 

            const randomX = Math.floor(Math.random() * (maxX - minX + 1)) + minX;
            const randomY = Math.floor(Math.random() * (maxY - minY + 1)) + minY;

            // Make further enemies smaller (perspective)
            const scale = (randomY - minY) / (maxY - minY) * 0.5 + 0.5;

            enemyEl.style.left = randomX + 'px';
            enemyEl.style.top = randomY + 'px';
            enemyEl.style.transform = `scale(${scale}) translateY(100px)`;

            // Elements inside enemy
            const visor = document.createElement('div');
            visor.classList.add('enemy-visor');
            
            const chargeBg = document.createElement('div');
            chargeBg.classList.add('charge-bar-bg');
            const chargeFill = document.createElement('div');
            chargeFill.classList.add('charge-bar');
            chargeBg.appendChild(chargeFill);

            enemyEl.appendChild(chargeBg);
            enemyEl.appendChild(visor);
            
            // Hit Enemy Logic
            enemyEl.addEventListener('mousedown', (e) => {
                if(!isPlaying) return;
                e.stopPropagation(); // Prevent main wrapper click from missing
                
                // Trigger regular shot things manually since we stopped propagation
                shotsFired++;
                hits++;
                kills++;
                
                // Visual recoil
                gunContainer.classList.remove('recoil');
                muzzleFlash.classList.remove('flash-anim');
                void gunContainer.offsetWidth;
                gunContainer.classList.add('recoil');
                muzzleFlash.classList.add('flash-anim');
                playShootSound();

                // Kill enemy
                removeEnemy(enemyObj);
                updateStats();
                
                // Increase difficulty slightly
                if(difficultySpeed > 600) difficultySpeed -= 50; 
            });

            gameWrapper.appendChild(enemyEl);

            const enemyObj = {
                el: enemyEl,
                chargeFill: chargeFill,
                timeAlive: 0,
                maxTime: difficultySpeed + (Math.random() * 500) // Slight variance
            };
            
            // Pop up animation fix
            setTimeout(() => { enemyEl.style.transform = `scale(${scale}) translateY(0)`; }, 10);
            
            activeEnemies.push(enemyObj);
        }

        function updateEnemies() {
            for(let i = activeEnemies.length - 1; i >= 0; i--) {
                let enemy = activeEnemies[i];
                enemy.timeAlive += 50;
                
                // Update progress bar
                let percent = (enemy.timeAlive / enemy.maxTime) * 100;
                enemy.chargeFill.style.width = percent + '%';

                // Enemy Shoots Player
                if(enemy.timeAlive >= enemy.maxTime) {
                    takeDamage(20);
                    removeEnemy(enemy);
                }
            }
        }

        function removeEnemy(enemyObj) {
            enemyObj.el.remove();
            activeEnemies = activeEnemies.filter(e => e !== enemyObj);
        }

        function takeDamage(amt) {
            health -= amt;
            if(health < 0) health = 0;
            
            // Update Health Bar UI
            healthBar.style.width = health + '%';
            if(health <= 40) healthBar.style.backgroundColor = '#ff5252';
            else if(health <= 70) healthBar.style.backgroundColor = '#ffc107';

            // Flash Screen Red
            damageOverlay.style.opacity = '1';
            setTimeout(() => { damageOverlay.style.opacity = '0'; }, 150);

            if(health <= 0) {
                gameOver();
            }
        }

        function updateStats() {
            killsVal.innerText = kills;
            let accuracy = shotsFired === 0 ? 100 : Math.round((hits / shotsFired) * 100);
            accVal.innerText = accuracy + '%';
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(spawnInterval);
            clearInterval(enemyTickInterval);
            
            menuTitle.innerText = "MISSION FAILED";
            menuTitle.style.color = "#ff5252";
            document.getElementById('menu-desc').innerText = `Kills: ${kills} | Accuracy: ${accVal.innerText}`;
            playBtn.innerText = "RETRY";
            menuOverlay.style.display = 'flex';
        }

        // Web Audio API for a snappy gun sound effect
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playShootSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        playBtn.addEventListener('click', startGame);
        gameWrapper.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
