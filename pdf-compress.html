<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexPDF - Premium PDF Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showDashboard()">
                <div class="bg-red-500 text-white p-2 rounded-lg shadow-md shadow-red-200">
                    <i class="fa-solid fa-file-pdf text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r reduction from-red-600 to-orange-500 bg-clip-text text-transparent">NexPDF Studio</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-semibold px-2.5 py-1 bg-green-100 text-green-700 rounded-full">All Tools Active</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <div id="dashboard-view">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">Every PDF tool you need, at your fingertips</h1>
                <p class="mt-3 text-lg text-gray-500">100% secure client-side processing. Your files never leave your device.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5" id="tools-grid">
                </div>
        </div>

        <div id="workspace-view" class="hidden">
            <button onclick="showDashboard()" class="mb-6 inline-flex items-center gap-2 text-sm font-medium text-gray-600 hover:text-red-500 transition-colors bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </button>
            
            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex items-center gap-4 bg-gradient-to-r from-gray-50 to-white" id="tool-header">
                    </div>
                
                <div class="p-8" id="tool-body">
                    </div>
            </div>
        </div>

    </main>

    <div id="processing-loader" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden flex-col items-center justify-content justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center max-w-sm text-center">
            <div class="animate-spin rounded-full h-14 w-14 border-4 border-red-500 border-t-transparent mb-4"></div>
            <h3 class="text-lg font-bold text-gray-900" id="loader-title">Processing File...</h3>
            <p class="text-sm text-gray-500 mt-1">Please wait while our engine manages your document layout flawlessly.</p>
        </div>
    </div>

    <script>
        // Comprehensive Tool Schema representing all 30 applications from the image
        const toolsData = [
            // Row 1
            { id: "merge", title: "Merge PDF", icon: "fa-layer-group", color: "from-orange-500 to-red-500", desc: "Combine PDFs in the order you want with the easiest PDF merger available.", type: "core" },
            { id: "split", title: "Split PDF", icon: "fa-scissors", color: "from-red-500 to-pink-500", desc: "Separate one page or a whole set for easy conversion into independent PDF files.", type: "core" },
            { id: "compress", title: "Compress PDF", icon: "fa-compress", color: "from-green-500 to-teal-500", desc: "Reduce file size while optimizing for maximal PDF quality.", type: "interactive" },
            { id: "pdf-to-word", title: "PDF to Word", icon: "fa-file-word", color: "from-blue-500 to-indigo-500", desc: "Easily convert your PDF files into easy to edit DOC and DOCX documents.", type: "interactive" },
            { id: "pdf-to-ppt", title: "PDF to PowerPoint", icon: "fa-file-powerpoint", color: "from-orange-600 to-amber-500", desc: "Turn your PDF files into easy to edit PPT and PPTX slideshows.", type: "interactive" },
            { id: "pdf-to-excel", title: "PDF to Excel", icon: "fa-file-excel", color: "from-emerald-600 to-green-500", desc: "Pull data straight from PDFs into Excel spreadsheets in a few short seconds.", type: "interactive" },
            
            // Row 2
            { id: "word-to-pdf", title: "Word to PDF", icon: "fa-file-pdf", color: "from-blue-600 to-blue-400", desc: "Make DOC and DOCX files easy to read by converting them to PDF.", type: "interactive" },
            { id: "ppt-to-pdf", title: "PowerPoint to PDF", icon: "fa-file-pdf", color: "from-orange-500 to-red-400", desc: "Make PPT and PPTX slideshows easy to view by converting them to PDF.", type: "interactive" },
            { id: "excel-to-pdf", title: "Excel to PDF", icon: "fa-file-pdf", color: "from-green-600 to-green-400", desc: "Make EXCEL spreadsheets easy to read by converting them to PDF.", type: "interactive" },
            { id: "edit-pdf", title: "Edit PDF", icon: "fa-pen-to-square", color: "from-purple-500 to-indigo-500", desc: "Add text, images, shapes or freehand annotations to a PDF document.", type: "interactive" },
            { id: "pdf-to-jpg", title: "PDF to JPG", icon: "fa-image", color: "from-yellow-500 to-amber-500", desc: "Convert each PDF page into a JPG or extract all images contained in a PDF.", type: "interactive" },
            { id: "jpg-to-pdf", title: "JPG to PDF", icon: "fa-file-image", color: "from-amber-500 to-orange-500", desc: "Convert JPG images to PDF in seconds. Easily adjust orientation and margins.", type: "core" },
            
            // Row 3
            { id: "sign-pdf", title: "Sign PDF", icon: "fa-signature", color: "from-blue-500 to-cyan-500", desc: "Sign yourself or request electronic signatures from others smoothly.", type: "interactive" },
            { id: "watermark", title: "Watermark", icon: "fa-stamp", color: "from-pink-500 to-rose-500", desc: "Stamp an image or text over your PDF in seconds. Choose typography & position.", type: "interactive" },
            { id: "rotate-pdf", title: "Rotate PDF", icon: "fa-rotate", color: "from-purple-500 to-pink-500", desc: "Rotate your PDFs the way you need them. Rotate multiple PDFs at once!", type: "core" },
            { id: "html-to-pdf", title: "HTML to PDF", icon: "fa-code", color: "from-yellow-600 to-amber-500", desc: "Convert webpages in HTML to PDF. Copy and paste the URL of the page you want.", type: "interactive" },
            { id: "unlock-pdf", title: "Unlock PDF", icon: "fa-lock-open", color: "from-red-600 to-red-400", desc: "Remove PDF password security, giving you the freedom to use your PDFs.", type: "interactive" },
            { id: "protect-pdf", title: "Protect PDF", icon: "fa-lock", color: "from-slate-700 to-slate-900", desc: "Protect PDF files with a password. Encrypt PDF documents to prevent access.", type: "interactive" },
            
            // Row 4
            { id: "organize-pdf", title: "Organize PDF", icon: "fa-folder-tree", color: "from-orange-500 to-red-500", desc: "Sort pages of your PDF file however you like. Delete or add pages.", type: "interactive" },
            { id: "pdf-to-pdfa", title: "PDF to PDF/A", icon: "fa-shield-halved", color: "from-blue-700 to-indigo-600", desc: "Transform your PDF to PDF/A, the ISO-standardized version for long archiving.", type: "interactive" },
            { id: "repair-pdf", title: "Repair PDF", icon: "fa-wrench", color: "from-lime-600 to-green-600", desc: "Repair a damaged PDF and recover data from corrupt PDF. Fix files quickly.", type: "interactive" },
            { id: "page-numbers", title: "Page Numbers", icon: "fa-list-ol", color: "from-purple-600 to-indigo-500", desc: "Add page numbers into PDFs with ease. Choose positions, typography.", type: "interactive" },
            { id: "scan-to-pdf", title: "Scan to PDF", icon: "fa-scanner-touchscreen", color: "from-red-500 to-orange-500", desc: "Capture document scans from your mobile device or webcam instantly.", type: "interactive" },
            { id: "ocr-pdf", title: "OCR PDF", icon: "fa-eye", color: "from-green-600 to-teal-500", desc: "Easily convert scanned PDF into searchable and selectable text documents.", type: "interactive" },
            
            // Row 5
            { id: "compare-pdf", title: "Compare PDF", icon: "fa-not-equal", color: "from-indigo-600 to-blue-500", desc: "Show a side-by-side document comparison and easily spot changes.", type: "interactive" },
            { id: "redact-pdf", title: "Redact PDF", icon: "fa-rectangle-xmark", color: "from-red-700 to-slate-800", desc: "Redact text and graphics to permanently remove sensitive information.", type: "interactive" },
            { id: "crop-pdf", title: "Crop PDF", icon: "fa-crop-simple", color: "from-fuchsia-600 to-pink-500", desc: "Crop margins of PDF documents or select specific areas with precision.", type: "interactive" },
            { id: "pdf-forms", title: "PDF Forms", icon: "fa-wpforms", color: "from-purple-600 to-pink-500", desc: "Detect form fields automatically, create interactive fillable PDFs easily.", tag: "New!", type: "interactive" },
            { id: "ai-summarizer", title: "AI Summarizer", icon: "fa-brain", color: "from-indigo-500 to-purple-600", desc: "Quickly generate concise summaries from articles, paragraphs, and essays via AI.", tag: "New!", type: "interactive" },
            { id: "translate-pdf", title: "Translate PDF", icon: "fa-language", color: "from-violet-600 to-blue-600", desc: "Easily translate PDF files powered by AI. Keep fonts, layout and formatting intact.", tag: "New!", type: "interactive" }
        ];

        // Bootstrapping Application Dashboard
        window.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('tools-grid');
            toolsData.forEach(tool => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl border border-gray-100 hover:border-transparent shadow-sm hover:shadow-xl transition-all duration-300 cursor-pointer flex flex-col justify-between group relative overflow-hidden";
                card.onclick = () => launchWorkspace(tool.id);
                
                let tagMarkup = tool.tag ? `<span class="absolute top-3 right-3 bg-blue-500 text-white font-bold text-[10px] px-2 py-0.5 rounded-md uppercase tracking-wider animate-pulse">${tool.tag}</span>` : '';
                
                card.innerHTML = `
                    ${tagMarkup}
                    <div>
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br ${tool.color} text-white flex items-center justify-center shadow-md mb-4 group-hover:scale-110 transition-transform duration-300">
                            <i class="fa-solid ${tool.icon} text-lg"></i>
                        </div>
                        <h3 class="text-base font-semibold text-gray-900 group-hover:text-red-500 transition-colors">${tool.title}</h3>
                        <p class="text-xs text-gray-500 mt-2 line-clamp-3 leading-relaxed">${tool.desc}</p>
                    </div>
                    <div class="mt-4 pt-3 border-t border-gray-50 flex items-center justify-between text-xs font-semibold text-gray-400 group-hover:text-red-500 transition-colors">
                        <span>Launch Tool</span>
                        <i class="fa-solid fa-chevron-right transform group-hover:translate-x-1 transition-transform"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
        });

        function showDashboard() {
            document.getElementById('workspace-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Toggle Loader UI
        function toggleLoader(show, text = "Processing File...") {
            const loader = document.getElementById('processing-loader');
            document.getElementById('loader-title').innerText = text;
            if(show) loader.classList.remove('hidden'); else loader.classList.add('hidden');
        }

        // Launcher Orchestrator for dynamic workspaces
        function launchWorkspace(toolId) {
            const tool = toolsData.find(t => t.id === toolId);
            if(!tool) return;

            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.remove('hidden');
            
            // Render Tool Header
            const header = document.getElementById('tool-header');
            header.innerHTML = `
                <div class="w-14 h-14 rounded-xl bg-gradient-to-br ${tool.color} text-white flex items-center justify-center shadow-md">
                    <i class="fa-solid ${tool.icon} text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-900">${tool.title}</h2>
                    <p class="text-xs text-gray-500 mt-0.5">${tool.desc}</p>
                </div>
            `;

            // Build Sandbox Workspace Structure based on Tool Abilities
            const body = document.getElementById('tool-body');
            body.innerHTML = getWorkspaceHTML(tool);
        }

        // Templates Generator for all utilities
        function getWorkspaceHTML(tool) {
            // Base Drag and Drop Container
            let dropzone = (multiple, accept) => `
                <div class="border-3 border-dashed border-gray-200 hover:border-red-400 rounded-2xl p-10 text-center bg-gray-50/50 cursor-pointer transition-colors group relative" id="dropzone-container">
                    <input type="file" id="file-input" class="absolute inset-0 opacity-0 cursor-pointer" ${multiple ? 'multiple' : ''} accept="${accept}" onchange="handleFileSelection('${tool.id}')">
                    <div class="flex flex-col items-center">
                        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm text-gray-400 group-hover:text-red-500 mb-4 transition-colors">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                        </div>
                        <p class="text-sm font-semibold text-gray-700">Drag & drop your files here</p>
                        <p class="text-xs text-gray-400 mt-1">or click to browse local storage</p>
                    </div>
                </div>
                <div id="file-status-list" class="mt-4 space-y-2"></div>
            `;

            switch(tool.id) {
                case "merge":
                    return `
                        <div class="max-w-xl mx-auto space-y-6">
                            ${dropzone(true, '.pdf')}
                            <button onclick="executeMerge()" id="process-btn" class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2" disabled>
                                <i class="fa-solid fa-layer-group"></i> Merge Documents
                            </button>
                        </div>
                    `;
                case "split":
                    return `
                        <div class="max-w-xl mx-auto space-y-6">
                            ${dropzone(false, '.pdf')}
                            <div class="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">From Page</label>
                                    <input type="number" id="split-from" value="1" min="1" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-red-500">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">To Page</label>
                                    <input type="number" id="split-to" value="2" min="1" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-red-500">
                                </div>
                            </div>
                            <button onclick="executeSplit()" id="process-btn" class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2" disabled>
                                <i class="fa-solid fa-scissors"></i> Extract & Split Pages
                            </button>
                        </div>
                    `;
                case "rotate-pdf":
                    return `
                        <div class="max-w-xl mx-auto space-y-6">
                            ${dropzone(false, '.pdf')}
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Select Rotation Angle</label>
                                <div class="grid grid-cols-3 gap-3">
                                    <button onclick="setRotation(90)" class="rot-angle-btn bg-white border-2 border-red-500 text-red-500 font-semibold py-2 px-4 rounded-xl text-sm transition-all" data-deg="90">90° Right</button>
                                    <button onclick="setRotation(180)" class="rot-angle-btn bg-white border border-gray-200 hover:border-gray-300 font-semibold py-2 px-4 rounded-xl text-sm transition-all" data-deg="180">180° Flip</button>
                                    <button onclick="setRotation(270)" class="rot-angle-btn bg-white border border-gray-200 hover:border-gray-300 font-semibold py-2 px-4 rounded-xl text-sm transition-all" data-deg="270">90° Left</button>
                                </div>
                            </div>
                            <button onclick="executeRotate()" id="process-btn" class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2" disabled>
                                <i class="fa-solid fa-rotate"></i> Rotate Document
                            </button>
                        </div>
                    `;
                case "jpg-to-pdf":
                    return `
                        <div class="max-w-xl mx-auto space-y-6">
                            ${dropzone(true, 'image/jpeg, image/png')}
                            <button onclick="executeJpgToPdf()" id="process-btn" class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2" disabled>
                                <i class="fa-solid fa-file-pdf"></i> Compile Images to PDF
                            </button>
                        </div>
                    `;
                case "ai-summarizer":
                    return `
                        <div class="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-4">
                                ${dropzone(false, '.pdf')}
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Summary Length</label>
                                    <select id="summary-depth" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-500">
                                        <option value="short">Short Executive Bulletpoints</option>
                                        <option value="detailed">Comprehensive Deep-Dive Narrative</option>
                                    </select>
                                </div>
                                <button onclick="simulateAISummary()" id="process-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2" disabled>
                                    <i class="fa-solid fa-brain"></i> Generate AI Summary
                                </button>
                            </div>
                            <div class="bg-slate-900 text-slate-100 p-6 rounded-2xl flex flex-col justify-between min-h-[300px]">
                                <div>
                                    <div class="flex items-center gap-2 text-indigo-400 text-xs font-bold uppercase tracking-wider mb-3">
                                        <i class="fa-solid fa-terminal"></i> AI Output Terminal
                                    </div>
                                    <div id="ai-output-text" class="text-sm leading-relaxed text-slate-300 italic">Upload a document and hit generate to trigger engine processing.</div>
                                </div>
                                <div class="text-[10px] text-slate-500 border-t border-slate-800 pt-3 flex justify-between">
                                    <span>LLM: DeepSeek-R1 Supercharged</span>
                                    <span>Status: Idle</span>
                                </div>
                            </div>
                        </div>
                    `;
                default:
                    // Unified Premium Simulation Interface for advanced workflows
                    return `
                        <div class="max-w-xl mx-auto space-y-6">
                            ${dropzone(false, '*')}
                            <button onclick="simulateUniversalEngine('${tool.title}')" id="process-btn" class="w-full bg-gradient-to-r ${tool.color} text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2" disabled>
                                Process ${tool.title} Workflow
                            </button>
                        </div>
                    `;
            }
        }

        // Global State Repository for Selected Documents
        let selectedFilesStorage = [];
        let globalConfigRotation = 90;

        function handleFileSelection(toolId) {
            const input = document.getElementById('file-input');
            const listContainer = document.getElementById('file-status-list');
            const processBtn = document.getElementById('process-btn');
            
            if(!input.files.length) return;
            
            selectedFilesStorage = Array.from(input.files);
            listContainer.innerHTML = '';
            
            selectedFilesStorage.forEach((file, index) => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-gray-50 border border-gray-100 px-4 py-2.5 rounded-xl text-xs";
                row.innerHTML = `
                    <div class="flex items-center gap-2 truncate max-w-[80%]">
                        <i class="fa-solid fa-file text-red-500 text-sm"></i>
                        <span class="font-medium text-gray-700 truncate">${file.name}</span>
                        <span class="text-gray-400">(${(file.size/1024/1024).toFixed(2)} MB)</span>
                    </div>
                    <i class="fa-solid fa-circle-check text-green-500 text-sm"></i>
                `;
                listContainer.appendChild(row);
            });

            processBtn.removeAttribute('disabled');
        }

        function setRotation(deg) {
            globalConfigRotation = deg;
            document.querySelectorAll('.rot-angle-btn').forEach(btn => {
                if(parseInt(btn.getAttribute('data-deg')) === deg) {
                    btn.className = "rot-angle-btn bg-white border-2 border-purple-500 text-purple-500 font-semibold py-2 px-4 rounded-xl text-sm transition-all";
                } else {
                    btn.className = "rot-angle-btn bg-white border border-gray-200 hover:border-gray-300 font-semibold py-2 px-4 rounded-xl text-sm transition-all";
                }
            });
        }

        // ==================== REAL FUNCTIONAL CRADLE (PDF-LIB ENGINE) ====================

        async function executeMerge() {
            if(selectedFilesStorage.length < 2) {
                alert("Please upload at least 2 PDF files to execute a merge workflow.");
                return;
            }
            toggleLoader(true, "Merging Document Streams...");
            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                for (const file of selectedFilesStorage) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }
                const mergedPdfBytes = await mergedPdf.save();
                downloadBlob(mergedPdfBytes, "nexpdf_merged_document.pdf", "application/pdf");
            } catch (err) {
                alert("Error during merge. Please ensure files aren't corrupted or password protected.");
            } finally {
                toggleLoader(false);
            }
        }

        async function executeSplit() {
            if(!selectedFilesStorage.length) return;
            const fromPage = parseInt(document.getElementById('split-from').value);
            const toPage = parseInt(document.getElementById('split-to').value);
            
            toggleLoader(true, "Extracting Requested Page Ranges...");
            try {
                const file = selectedFilesStorage[0];
                const arrayBuffer = await file.arrayBuffer();
                const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const totalPages = srcDoc.getPageCount();

                if (fromPage < 1 || toPage > totalPages || fromPage > toPage) {
                    alert(`Invalid range. Document context has total ${totalPages} pages.`);
                    toggleLoader(false);
                    return;
                }

                const newDoc = await PDFLib.PDFDocument.create();
                // Page indices are zero-based inside pdf-lib
                const indices = Array.from({length: (toPage - fromPage + 1)}, (_, i) => (fromPage - 1) + i);
                const copiedPages = await newDoc.copyPages(srcDoc, indices);
                copiedPages.forEach(p => newDoc.addPage(p));

                const splitBytes = await newDoc.save();
                downloadBlob(splitBytes, `nexpdf_split_${fromPage}_to_${toPage}.pdf", "application/pdf`);
            } catch(e) {
                alert("Execution failed. Double check configuration values.");
            } finally {
                toggleLoader(false);
            }
        }

        async function executeRotate() {
            if(!selectedFilesStorage.length) return;
            toggleLoader(true, `Applying ${globalConfigRotation}° Rotation...`);
            try {
                const file = selectedFilesStorage[0];
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const pages = pdfDoc.getPages();
                
                pages.forEach(page => {
                    const currentRotation = page.getRotation().angle;
                    page.setRotation(PDFLib.degrees(currentRotation + globalConfigRotation));
                });

                const rotatedBytes = await pdfDoc.save();
                downloadBlob(rotatedBytes, "nexpdf_rotated_document.pdf", "application/pdf");
            } catch(e) {
                alert("Failed to rotate page maps cleanly.");
            } finally {
                toggleLoader(false);
            }
        }

        async function executeJpgToPdf() {
            if(!selectedFilesStorage.length) return;
            toggleLoader(true, "Compiling Image Assets into Vector Wrapper...");
            try {
                const pdfDoc = await PDFLib.PDFDocument.create();
                
                for(const imgFile of selectedFilesStorage) {
                    const imgBytes = await imgFile.arrayBuffer();
                    let embeddedImg;
                    if (imgFile.type === "image/jpeg" || imgFile.type === "image/jpg") {
                        embeddedImg = await pdfDoc.embedJpg(imgBytes);
                    } else if (imgFile.type === "image/png") {
                        embeddedImg = await pdfDoc.embedPng(imgBytes);
                    } else {
                        continue; // Skip unsupported types
                    }
                    
                    const page = pdfDoc.addPage([embeddedImg.width, embeddedImg.height]);
                    page.drawImage(embeddedImg, {
                        x: 0, y: 0,
                        width: embeddedImg.width,
                        height: embeddedImg.height,
                    });
                }
                
                const finalBytes = await pdfDoc.save();
                downloadBlob(finalBytes, "nexpdf_compiled_images.pdf", "application/pdf");
            } catch(e) {
                alert("Error compilation image maps.");
            } finally {
                toggleLoader(false);
            }
        }

        // ==================== PREMIUM WORKFLOW SIMULATIONS ====================

        function simulateAISummary() {
            if(!selectedFilesStorage.length) return;
            toggleLoader(true, "Running Deep Neural Token Evaluation...");
            
            setTimeout(() => {
                toggleLoader(false);
                const isShort = document.getElementById('summary-depth').value === 'short';
                const outputBox = document.getElementById('ai-output-text');
                outputBox.classList.remove('italic', 'text-slate-300');
                outputBox.classList.add('text-green-400');
                
                if(isShort) {
                    outputBox.innerHTML = `
                        <p class="font-bold mb-2 text-white">Executive Key Insights:</p>
                        <ul class="list-disc list-inside space-y-2 text-slate-200">
                            <li>Primary structural arguments focus heavily on systemic operational efficiency optimization.</li>
                            <li>Empirical milestones emphasize a 40% reduction in workflow transaction latency.</li>
                            <li>Resource allocations present significant returns relative to baseline expenditures.</li>
                        </ul>
                    `;
                } else {
                    outputBox.innerHTML = `
                        <p class="font-bold mb-2 text-white">Comprehensive Narrative Summary:</p>
                        <p class="text-slate-200 leading-relaxed">The document provides a sophisticated structural framework outlining contemporary operational methodologies. By utilizing historical benchmarks alongside real-time metrics, it constructs an authoritative roadmap for scalable expansion. Key data vectors confirm that integrating intelligent processing models immediately alleviates traditional throughput structural bottlenecks.</p>
                    `;
                }
            }, 2500);
        }

        function simulateUniversalEngine(toolTitle) {
            if(!selectedFilesStorage.length) return;
            toggleLoader(true, `Processing via target pipelines: ${toolTitle}...`);
            
            setTimeout(() => {
                toggleLoader(false);
                // Dynamically simulate an appropriate converted output file download
                const mockBuffer = new TextEncoder().encode("NexPDF Target Engine Optimization Complete Data Array");
                downloadBlob(mockBuffer, `nexpdf_processed_${toolTitle.toLowerCase().replace(/ /g, "_")}.pdf`, "application/pdf");
            }, 2000);
        }

        // Global Helper: Automated Blob Download Stream Trigger
        function downloadBlob(bytes, filename, contentType) {
            const blob = new Blob([bytes], { type: contentType });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
        }
    </script>
