<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProEdit | Advanced Image Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4169e1;
            --primary-hover: #3152c9;
            --bg: #f4f7fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --border: #dfe6e9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .top-toolbar {
            display: flex;
            justify-content: center;
            background: white;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            gap: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            color: #636e72;
            font-size: 10px;
            font-weight: 700;
            transition: 0.2s;
            min-width: 75px;
        }

        .tool-btn i { font-size: 18px; margin-bottom: 4px; }
        .tool-btn:hover, .tool-btn.active { 
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .workspace {
            display: flex;
            max-width: 1400px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 20px;
            height: calc(100vh - 150px);
        }

        .editor-container {
            flex: 2;
            background: #d1d8e0;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 2px dashed #a5b1c2;
            cursor: crosshair;
        }

        #preview-img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background: white;
            user-select: none;
        }

        .sidebar {
            flex: 0 0 350px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow-y: auto;
        }

        .section-title { font-size: 16px; font-weight: 700; margin: 15px 0 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: #636e72; margin-bottom: 5px; }
        
        .input-row { display: flex; gap: 8px; }
        .input-row input, .input-row select { 
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; 
        }

        .btn-open {
            width: 100%; padding: 12px; background: #fff; border: 2px solid var(--primary);
            color: var(--primary); border-radius: 8px; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .btn-save {
            width: 100%; padding: 15px; background: #27ae60; color: white; border: none;
            border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* Text Overlay Style */
        #text-overlay {
            position: absolute;
            color: white;
            font-size: 24px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        @media (max-width: 992px) {
            .workspace { flex-direction: column; height: auto; }
            .sidebar { width: 100%; }
            .editor-container { height: 400px; }
        }
    </style>
</head>
<body>

    <header class="top-toolbar">
        <button class="tool-btn active" onclick="setMode('resize', this)"><i class="fa-solid fa-expand"></i>RESIZE</button>
        <button class="tool-btn" onclick="setMode('text', this)"><i class="fa-solid fa-font"></i>ADD TEXT</button>
        <button class="tool-btn" onclick="applyFilter('grayscale(100%)')"><i class="fa-solid fa-droplet-slash"></i>B&W</button>
        <button class="tool-btn" onclick="applyFilter('sepia(100%)')"><i class="fa-solid fa-leaf"></i>SEPIA</button>
        <button class="tool-btn" onclick="applyFilter('blur(5px)')"><i class="fa-solid fa-eye-slash"></i>BLUR</button>
        <button class="tool-btn" onclick="rotateImg()"><i class="fa-solid fa-rotate-right"></i>ROTATE</button>
        <button class="tool-btn" style="background:#ff7675; color:white" onclick="resetAll()"><i class="fa-solid fa-trash-can"></i>RESET</button>
    </header>

    <div class="workspace">
        <div class="editor-container" id="dropzone" onclick="handleImageClick(event)">
            <img id="preview-img" src="https://via.placeholder.com/800x450/FFFFFF/4169e1?text=Upload+Image+to+Start" alt="Preview">
            <div id="text-overlay"></div>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>

        <aside class="sidebar">
            <button class="btn-open" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-file-import"></i> Choose Image
            </button>

            <div class="section-title">Dimensions & Size</div>
            <div class="input-group">
                <label>Pixels (W x H)</label>
                <div class="input-row">
                    <input type="number" id="img-w" placeholder="Width">
                    <input type="number" id="img-h" placeholder="Height">
                </div>
            </div>

            <div class="input-group">
                <label>Target File Size (Optional)</label>
                <div class="input-row">
                    <input type="number" id="target-size" placeholder="Value (e.g. 200)">
                    <select id="size-unit">
                        <option value="kb">KB</option>
                        <option value="mb">MB</option>
                    </select>
                </div>
            </div>

            <div id="text-controls" style="display:none;">
                <div class="section-title">Text Settings</div>
                <div class="input-group">
                    <label>Text Content</label>
                    <input type="text" id="text-input" placeholder="Type here..." oninput="updateText()" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
                </div>
                <div class="input-row">
                    <div>
                        <label>Font Size</label>
                        <input type="number" id="font-size" value="30" oninput="updateText()">
                    </div>
                    <div>
                        <label>Font Family</label>
                        <select id="font-family" onchange="updateText()">
                            <option value="Arial">Arial</option>
                            <option value="Verdana">Verdana</option>
                            <option value="Times New Roman">Serif</option>
                            <option value="Courier New">Monospace</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="btn-save" onclick="downloadImage()">
                <i class="fa-solid fa-cloud-arrow-down"></i> Export & Download
            </button>
        </aside>
    </div>

    <div class="content-area" style="max-width: 900px; margin: 40px auto; padding: 20px;">
        <h2 style="color:var(--primary)">Professional Image Resizer</h2>
        <p>Easily resize, crop, and add text to your images in seconds. Whether you need a specific <strong>KB size</strong> for government forms or a custom resolution for social media, our tool handles it all locally in your browser.</p>
    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview-img');
        const imgW = document.getElementById('img-w');
        const imgH = document.getElementById('img-h');
        const textOverlay = document.getElementById('text-overlay');
        const textControls = document.getElementById('text-controls');
        
        let originalImg = null;
        let rotation = 0;
        let mode = 'resize';
        let textData = { x: 0, y: 0, content: '', size: 30, font: 'Arial' };

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        originalImg = img;
                        preview.src = img.src;
                        imgW.value = img.width;
                        imgH.value = img.height;
                        resetAll();
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        function setMode(newMode, btn) {
            mode = newMode;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            textControls.style.display = (mode === 'text') ? 'block' : 'none';
        }

        function handleImageClick(e) {
            if (mode === 'text') {
                const rect = preview.getBoundingClientRect();
                textData.x = e.clientX - rect.left;
                textData.y = e.clientY - rect.top;
                updateText();
            }
        }

        function updateText() {
            textData.content = document.getElementById('text-input').value;
            textData.size = document.getElementById('font-size').value;
            textData.font = document.getElementById('font-family').value;
            
            textOverlay.innerText = textData.content;
            textOverlay.style.left = textData.x + "px";
            textOverlay.style.top = textData.y + "px";
            textOverlay.style.fontSize = textData.size + "px";
            textOverlay.style.fontFamily = textData.font;
        }

        function applyFilter(filter) {
            preview.style.filter = filter;
        }

        function rotateImg() {
            rotation = (rotation + 90) % 360;
            preview.style.transform = `rotate(${rotation}deg)`;
        }

        function resetAll() {
            rotation = 0;
            preview.style.filter = 'none';
            preview.style.transform = 'none';
            textOverlay.innerText = '';
            document.getElementById('text-input').value = '';
        }

        async function downloadImage() {
            if (!originalImg) return alert("Please upload an image!");

            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            
            const finalW = parseInt(imgW.value);
            const finalH = parseInt(imgH.value);
            const targetSizeVal = parseFloat(document.getElementById('target-size').value);
            const unit = document.getElementById('size-unit').value;

            canvas.width = finalW;
            canvas.height = finalH;

            // Apply Filters & Rotation
            ctx.filter = preview.style.filter;
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.drawImage(originalImg, -finalW/2, -finalH/2, finalW, finalH);
            
            // Add Text
            if (textData.content) {
                ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform for text
                ctx.font = `${textData.size}px ${textData.font}`;
                ctx.fillStyle = "white";
                ctx.shadowColor = "black";
                ctx.shadowBlur = 7;
                // Scale text position relative to canvas size
                const scaleX = finalW / preview.clientWidth;
                const scaleY = finalH / preview.clientHeight;
                ctx.fillText(textData.content, textData.x * scaleX, textData.y * scaleY);
            }

            // Quality logic for Target KB
            let quality = 0.9;
            let dataUrl = canvas.toDataURL('image/jpeg', quality);
            
            if (targetSizeVal) {
                const targetBytes = unit === 'kb' ? targetSizeVal * 1024 : targetSizeVal * 1024 * 1024;
                // Binary search for quality to match file size
                for (let i = 0; i < 5; i++) {
                    const size = Math.round((dataUrl.split(',')[1].length * 3) / 4);
                    if (size > targetBytes) {
                        quality -= 0.15;
                        dataUrl = canvas.toDataURL('image/jpeg', Math.max(0.1, quality));
                    }
                }
            }

            const link = document.createElement('a');
            link.download = 'proedit-image.jpg';
            link.href = dataUrl;
            link.click();
        }
    </script>
</body>
</html>
