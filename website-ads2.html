<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI YouTube Thumbnail Pro</title>
    <style>
        :root { --yt-red: #FF0000; --yt-black: #0F0F0F; --yt-gray: #F2F2F2; --white: #FFFFFF; }
        body { font-family: 'Roboto', sans-serif; background: var(--yt-gray); margin: 0; color: var(--yt-black); }
        header { background: var(--white); padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { color: var(--yt-red); font-size: 22px; font-weight: bold; text-decoration: none; }
        .container { max-width: 900px; margin: 30px auto; background: var(--white); padding: 25px; border-radius: 12px; }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        textarea { padding: 12px; border: 1px solid #ccc; border-radius: 8px; height: 80px; resize: none; }
        button { background: var(--yt-red); color: #fff; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #loading { display: none; text-align: center; margin: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--yt-red); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #result-section { display: none; margin-top: 30px; text-align: center; }
        .thumb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .thumb-card img { width: 100%; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dl-btn { background: #222; margin-top: 10px; font-size: 13px; padding: 8px 15px; }
        @media (max-width: 600px) { .thumb-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header><a href="#" class="logo">▶ AI Thumbnail Pro</a></header>

<div class="container">
    <h1>Create Viral Thumbnails</h1>
    <div class="input-group">
        <label>Video Topic / Prompt</label>
        <textarea id="prompt" placeholder="Describe your video (e.g. Minecraft survival challenge)"></textarea>
    </div>
    <div style="text-align:center;">
        <button onclick="generateThumbnail()">Generate 2 Variations</button>
    </div>

    <div id="loading">
        <div class="loader"></div>
        <p>AI is thinking... Render might take a moment to wake up.</p>
    </div>

    <div id="result-section">
        <h3>Pick Your Best Thumbnail</h3>
        <div class="thumb-grid">
            <div class="thumb-card">
                <img id="img1" src="">
                <button class="dl-btn" onclick="downloadThis('img1')">Download Variation 1</button>
            </div>
            <div class="thumb-card">
                <img id="img2" src="">
                <button class="dl-btn" onclick="downloadThis('img2')">Download Variation 2</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function generateThumbnail() {
        const prompt = document.getElementById('prompt').value;
        if(!prompt) return alert("Please enter a topic!");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('result-section').style.display = 'none';

        try {
            const response = await fetch('https://pooreyoutuber.onrender.com/generate-thumbnail', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await response.json();

            if(data.success) {
                document.getElementById('img1').src = data.thumbnails[0];
                document.getElementById('img2').src = data.thumbnails[1];
                document.getElementById('result-section').style.display = 'block';
            } else {
                alert("AI Note: " + data.error);
            }
        } catch (err) {
            alert("Connection error. Render server is likely starting up. Wait 10s and try again.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function downloadThis(id) {
        const url = document.getElementById(id).src;
        const a = document.createElement('a');
        a.href = url;
        a.download = `thumbnail-${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
</body>
</html>
