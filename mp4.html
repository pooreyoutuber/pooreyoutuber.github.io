<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Articles Manager - High-Quality Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-light: #eff6ff;
            --success-color: #10b981;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            background: #ffffff;
        }

        .app-header .icon-box {
            background: var(--primary-color);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .workspace {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 650px;
        }

        .sidebar {
            border-right: 1px solid var(--border-color);
            padding: 16px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 750px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .nav-item:hover { background: var(--bg-main); }
        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary-color);
            border-color: #bfdbfe;
            font-weight: 600;
        }

        /* Split View Main Area */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Left: Viewer, Right: Editor */
            gap: 1px;
            background: var(--border-color);
        }

        .content-panel, .editor-panel {
            padding: 24px;
            background: #ffffff;
            max-height: 750px;
            overflow-y: auto;
        }

        .panel-header h2 {
            font-size: 1.3rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* SEO Typography Preview */
        article section { margin-bottom: 20px; }
        article h3 { font-size: 1.1rem; color: #0f172a; margin-bottom: 8px; font-weight: 600; }
        article p { color: #475569; font-size: 0.95rem; margin-bottom: 8px; }

        /* Form Styling */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dark);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-dark);
            outline: none;
        }
        .form-group textarea {
            height: 180px;
            resize: vertical;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-save {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.9; }

        @media (max-width: 992px) {
            .workspace { grid-template-columns: 1fr; }
            .main-content { grid-template-columns: 1fr; }
            .sidebar { max-height: 200px; }
        }
    </style>
</head>
<body>

    <main class="app-container">
        <header class="app-header">
            <div class="icon-box">☰</div>
            <h1>Articles Management Dashboard</h1>
        </header>

        <div class="workspace">
            <nav class="sidebar" id="sidebar-nav"></nav>

            <div class="main-content">
                
                <div class="content-panel">
                    <div class="panel-header">
                        <h2>✨ Live Website Preview</h2>
                    </div>
                    <h2 id="preview-title" style="margin-bottom: 15px;"></h2>
                    <article id="preview-body"></article>
                </div>

                <div class="editor-panel">
                    <div class="panel-header">
                        <h2>✍️ Live Content Writer</h2>
                    </div>
                    <form id="article-form" onsubmit="saveArticle(event)">
                        <div class="form-group">
                            <label>Heading / Title</label>
                            <input type="text" id="edit-heading" placeholder="e.g., Introduction, Why Choose Us">
                        </div>
                        <div class="form-group">
                            <label>Paragraph Content (Sirf simple text likhein)</label>
                            <textarea id="edit-text" placeholder="Yahan apna article ka main content bina kisi HTML tag ke likhein..."></textarea>
                        </div>
                        <button type="submit" class="btn-save">💾 Save & Update Article</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <script>
        // Centralized Array Database
        let currentKey = "article1";
        const articlesData = {
            article1: { title: "1. Atclas", heading: "Welcome to Atclas", text: "Welcome to our website! In this article, we will explore various aspects of our services and how they can benefit you. Our goal is to provide the best experience and valuable information to our users." },
            article2: { title: "2. Articles", heading: "Our Services Overview", text: "We offer high-quality services designed to meet your needs. Our team is dedicated to delivering excellent results with a focus on customer satisfaction." },
            article3: { title: "3. Articles", heading: "Why Choose Us", text: "This is a placeholder for the third article. Write anything you want here." },
            article4: { title: "4. Articles", heading: "Article 4 Title", text: "Write your article paragraph details directly here." },
            article5: { title: "5. Articles", heading: "Article 5 Title", text: "Write your article paragraph details directly here." },
            article6: { title: "6. Articles", heading: "Article 6 Title", text: "Write your article paragraph details directly here." },
            article7: { title: "7. Articles", heading: "Article 7 Title", text: "Write your article paragraph details directly here." },
            article8: { title: "8. Articles", heading: "Article 8 Title", text: "Write your article paragraph details directly here." },
            article9: { title: "9. Articles", heading: "Article 9 Title", text: "Write your article paragraph details directly here." },
            article10: { title: "10. Articles", heading: "Article 10 Title", text: "Write your article paragraph details directly here." }
        };

        // Render Sidebar Menu Automatically
        function renderSidebar() {
            const sidebar = document.getElementById('sidebar-nav');
            sidebar.innerHTML = '';
            Object.keys(articlesData).forEach(key => {
                const isActive = key === currentKey ? 'active' : '';
                sidebar.innerHTML += `
                    <a href="#" class="nav-item ${isActive}" onclick="switchArticle(event, '${key}')">
                        <span>${articlesData[key].title}</span>
                        <span class="arrow">&gt;</span>
                    </a>
                `;
            });
        }

        // Update Content Viewer and Editor
        function updateUI() {
            const currentData = articlesData[currentKey];
            
            // Preview Panel Render (Design System automatically wraps data)
            document.getElementById('preview-title').innerText = currentData.title;
            document.getElementById('preview-body').innerHTML = `
                <section>
                    <h3>${currentData.heading}</h3>
                    <p>${currentData.text}</p>
                </section>
            `;

            // Form Fields Update
            document.getElementById('edit-heading').value = currentData.heading;
            document.getElementById('edit-text').value = currentData.text;
        }

        // Article Switcher Trigger
        function switchArticle(event, key) {
            event.preventDefault();
            currentKey = key;
            renderSidebar();
            updateUI();
        }

        // Action: Save Dynamic Input Form Data
        function saveArticle(event) {
            event.preventDefault();
            
            // Collect Input data safely
            const updatedHeading = document.getElementById('edit-heading').value;
            const updatedText = document.getElementById('edit-text').value;

            // Save inside database state
            articlesData[currentKey].heading = updatedHeading;
            articlesData[currentKey].text = updatedText;

            // Update UI instantly
            updateUI();
            alert(`${articlesData[currentKey].title} successfully updated inside database!`);
        }

        // Init Load
        renderSidebar();
        updateUI();
    </script>
</body>
</html>
