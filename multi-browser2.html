<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Channel Growth Pro | Multi-Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #FF0000;
            --brand-hover: #D90000;
            --bg: #F4F7FE;
            --card-bg: #FFFFFF;
            --text-main: #1B2559;
            --text-secondary: #A3AED0;
            --accent: #4318FF;
            --border: #E0E5F2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            background: var(--card-bg);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--brand); text-decoration: none; display: flex; align-items: center; gap: 8px; }

        /* Container */
        .container { max-width: 1000px; margin: 3rem auto; padding: 0 20px; }

        .hero-section { text-align: center; margin-bottom: 2.5rem; }
        .hero-section h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .hero-section p { color: var(--text-secondary); font-size: 1.1rem; }

        /* Search Card */
        .main-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .search-wrapper { position: relative; margin-bottom: 1.5rem; }
        
        .input-group {
            display: flex;
            gap: 12px;
            background: #F4F7FE;
            padding: 8px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 15px;
            font-size: 1rem;
            outline: none;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--brand);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover { background: var(--brand-hover); transform: translateY(-2px); }

        /* Suggestions Dropdown */
        .suggestions-box {
            position: absolute;
            top: 105%; left: 0; right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }

        .suggestion-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid var(--bg);
        }
        .suggestion-item:hover { background: var(--bg); }
        .suggestion-item img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--border); }
        .suggestion-item .name { font-weight: 700; font-size: 1rem; display: block; }

        /* Preview Area */
        .channel-preview {
            display: none;
            background: #F4F7FE;
            border-radius: 15px;
            padding: 20px;
            margin-top: 1.5rem;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .preview-flex { display: flex; align-items: center; gap: 20px; }
        .preview-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .preview-info h3 { margin: 0; font-size: 1.2rem; }
        .preview-info p { margin: 5px 0 0; font-size: 0.9rem; color: var(--text-secondary); }

        /* Configuration Grid */
        .config-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 2rem;
        }
        .config-item label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); text-transform: uppercase; }
        select, .num-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: white;
            font-weight: 600;
            outline: none;
        }

        .btn-launch {
            width: 100%;
            margin-top: 2rem;
            padding: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2);
            transition: 0.3s;
        }
        .btn-launch:hover { opacity: 0.9; transform: translateY(-3px); }

        /* Players Section */
        #playerGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 4rem;
            padding-bottom: 5rem;
        }
        .video-wrapper {
            background: black;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 16/9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        iframe { width: 100%; height: 100%; border: none; }

        .loader { display: none; margin: 15px auto; border: 3px solid #f3f3f3; border-top: 3px solid var(--brand); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .config-grid { grid-template-columns: 1fr; }
            .hero-section h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo"><span>🚀</span> PooreYoutuber Pro</a>
</nav>

<div class="container">
    <div class="hero-section">
        <h1>YouTube Multi-Viewer</h1>
        <p>Boost your channel growth by watching multiple videos simultaneously.</p>
    </div>

    <div class="main-card">
        <div class="search-wrapper">
            <div class="input-group">
                <input type="text" id="channelInput" placeholder="Paste Channel Link (e.g., https://youtube.com/@user)" autocomplete="off">
                <button class="btn-primary" onclick="fetchChannelData()">Load Channel</button>
            </div>
            <div id="suggestions" class="suggestions-box"></div>
        </div>

        <div class="loader" id="loader"></div>

        <div id="channelPreview" class="channel-preview">
            <div class="preview-flex">
                <img id="previewImg" src="" class="preview-img">
                <div class="preview-info">
                    <h3 id="channelName">Channel Name</h3>
                    <p id="videoStatus">0 videos loaded</p>
                </div>
            </div>
        </div>

        <div class="config-grid">
            <div class="config-item">
                <label>Playback Type</label>
                <select id="videoType">
                    <option value="latest_long">Latest Long Videos</option>
                    <option value="oldest_long">Oldest Long Videos</option>
                    <option value="latest_shorts">Latest Shorts</option>
                </select>
            </div>
            <div class="config-item">
                <label>Number of Windows</label>
                <input type="number" id="viewCount" class="num-input" value="15" min="1" max="50">
            </div>
            <div class="config-item">
                <label>Audio</label>
                <select id="audioSetting">
                    <option value="1">Muted (Faster Load)</option>
                    <option value="0">Sound On</option>
                </select>
            </div>
        </div>

        <button class="btn-launch" onclick="launchSession()">Generate Multi-View Session</button>
    </div>

    <div id="playerGrid"></div>
</div>

<script>
    let currentVideos = [];
    const API_BASE = "https://part-5.onrender.com"; // Isse apni Render URL se check karle

    // URL se Handle ya ID nikalne ka updated logic
    function parseInput(val) {
        val = val.trim();
        if (val.includes('youtube.com/')) {
            // Poora URL parse karna
            if (val.includes('/@')) {
                return '@' + val.split('/@')[1].split(/[/?]/)[0];
            } else if (val.includes('/channel/')) {
                return val.split('/channel/')[1].split(/[/?]/)[0];
            }
        }
        return val.startsWith('@') ? val : '@' + val;
    }

    async function fetchChannelData() {
        const rawInput = document.getElementById('channelInput').value;
        const input = parseInput(rawInput);
        
        if (!rawInput) return alert("Pehle link ya handle toh daal!");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('channelPreview').style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/fetch-channel`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ channelHandle: input })
            });
            const data = await res.json();

            if (data.success && data.videos.length > 0) {
                document.getElementById('channelName').innerText = data.channelTitle;
                document.getElementById('previewImg').src = data.thumbnail;
                document.getElementById('videoStatus').innerText = `${data.totalVideos} videos fetched from channel.`;
                currentVideos = data.videos; // Yeh poori list store karega
                document.getElementById('channelPreview').style.display = 'block';
            } else {
                alert("Channel nahi mila! Make sure the link is correct.");
            }
        } catch (e) {
            alert("Server connection error! Check if Render is awake.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function launchSession() {
        if (currentVideos.length === 0) return alert("Pehle channel load karo!");
        
        const type = document.getElementById('videoType').value;
        const count = parseInt(document.getElementById('viewCount').value);
        const muted = document.getElementById('audioSetting').value === "1" ? "&mute=1" : "&mute=0";
        const grid = document.getElementById('playerGrid');
        
        grid.innerHTML = '';
        
        // Videos Filter aur Sort Logic
        let listToPlay = [];
        if (type === 'latest_shorts') {
            listToPlay = currentVideos.filter(v => v.isShort);
            if(listToPlay.length === 0) listToPlay = currentVideos; // Fallback
        } else if (type === 'oldest_long') {
            listToPlay = [...currentVideos].reverse();
        } else {
            listToPlay = currentVideos; // Latest Long
        }

        // Loop through the count and rotate videos
        for (let i = 0; i < count; i++) {
            const videoIndex = i % listToPlay.length; // Yeh har window mein alag video daalega
            const videoId = listToPlay[videoIndex].id;

            const wrapper = document.createElement('div');
            wrapper.className = 'video-wrapper';
            // Added playlist & loop param for continuous watch
            wrapper.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1${muted}&rel=0&playlist=${videoId}&loop=1" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>`;
            grid.appendChild(wrapper);
        }
        grid.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
